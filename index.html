<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* Card Container */
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .welcome-card:hover {
            transform: translateY(-5px);
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            color: #4a5568;
            margin-bottom: 0.5rem;
        }

        #dynamic-greeting {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        p.description {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Button */
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            background: #764ba2;
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>Welcome!</h1>
        <!-- JavaScript will update this greeting based on the user's time of day -->
        <div id="dynamic-greeting">Hello there!</div>
        
        <p class="description">
            We are absolutely thrilled to have you here. This is a beautiful, responsive, single-file template ready for your next big idea.
        </p>
        
        <button class="btn" onclick="exploreMore()">Explore Now</button>
    </div>

    <script>
        // Dynamic time-based greeting
        const greetingElement = document.getElementById('dynamic-greeting');
        const hour = new Date().getHours();

        if (hour < 12) {
            greetingElement.textContent = "Good morning! Wishing you a great day ahead.";
        } else if (hour < 18) {
            greetingElement.textContent = "Good afternoon! Glad you stopped by.";
        } else {
            greetingElement.textContent = "Good evening! Hope you're having a relaxing night.";
        }

        // Button click action
        function exploreMore() {
            alert("Thanks for clicking! You can easily link this button to your next page.");
        }
    </script>
</body>
</html>
